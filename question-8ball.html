<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask the Ball</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Background ── */
body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse 60% 50% at 50% 55%,
      rgba(60,10,120,0.45) 0%,
      transparent 70%),
    #050010;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  padding: 32px 20px;
  font-family: 'Cinzel', serif;
  overflow: hidden;
  position: relative;
}

/* Starfield */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: star-twinkle var(--d) ease-in-out infinite alternate var(--delay);
}

@keyframes star-twinkle {
  0%   { opacity: 0.08; transform: scale(0.7); }
  100% { opacity: 0.7;  transform: scale(1.2); }
}

/* ── Title ── */
.title {
  position: relative;
  z-index: 2;
  font-size: clamp(0.7rem, 2vw, 0.85rem);
  letter-spacing: 0.45em;
  text-transform: uppercase;
  color: rgba(160,120,220,0.55);
  text-align: center;
}

/* ── Ball scene ── */
.ball-scene {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

/* Floating idle animation — paused during shake */
.ball-wrap {
  animation: float 5s ease-in-out infinite;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

@keyframes float {
  0%, 100% { transform: translateY(0);    }
  50%       { transform: translateY(-12px); }
}

/* Shake — overrides float for its duration */
.ball-wrap.shaking {
  animation: shake 0.7s cubic-bezier(0.36,0.07,0.19,0.97) both;
}

@keyframes shake {
  0%   { transform: translate(0,0)        rotate(0deg);   }
  8%   { transform: translate(-14px,-9px) rotate(-5deg);  }
  16%  { transform: translate(14px,9px)   rotate(5deg);   }
  24%  { transform: translate(-11px,12px) rotate(-4deg);  }
  32%  { transform: translate(11px,-12px) rotate(4deg);   }
  40%  { transform: translate(-14px,5px)  rotate(-5deg);  }
  48%  { transform: translate(14px,-5px)  rotate(5deg);   }
  56%  { transform: translate(-8px,10px)  rotate(-3deg);  }
  64%  { transform: translate(8px,-8px)   rotate(3deg);   }
  76%  { transform: translate(-4px,4px)   rotate(-1deg);  }
  88%  { transform: translate(2px,-2px)   rotate(0.5deg); }
  100% { transform: translate(0,0)        rotate(0deg);   }
}

/* ── The ball itself ── */
.ball {
  width: clamp(280px, 45vw, 360px);
  height: clamp(280px, 45vw, 360px);
  border-radius: 50%;
  position: relative;

  /* Deep sphere gradient */
  background:
    radial-gradient(circle at 33% 30%,
      rgba(110,60,200,0.22) 0%,
      transparent 48%),
    radial-gradient(circle at 68% 72%,
      rgba(40,0,90,0.35) 0%,
      transparent 38%),
    radial-gradient(circle at 50% 50%,
      #1c0848 0%,
      #0d0428 38%,
      #050018 72%,
      #010008 100%);

  box-shadow:
    inset -28px -22px 70px rgba(0,0,0,0.95),
    inset  12px  10px 36px rgba(80,40,150,0.18),
    0 0  55px rgba(70,15,150,0.4),
    0 28px 72px rgba(0,0,0,0.75),
    0 0 0 1.5px rgba(70,30,130,0.25);

  transition: filter 0.3s ease;
}

.ball:hover {
  filter: brightness(1.12);
}

/* Specular highlight */
.ball::before {
  content: '';
  position: absolute;
  width: 22%;
  height: 14%;
  border-radius: 50%;
  background: radial-gradient(ellipse,
    rgba(255,255,255,0.11) 0%,
    transparent 100%);
  top: 18%;
  left: 20%;
  transform: rotate(-18deg);
}

/* ── White "8" circle ── */
.eight-wrap {
  position: absolute;
  top: 9%;
  left: 50%;
  transform: translateX(-50%);
  width: 26%;
  height: 26%;
  border-radius: 50%;
  background: rgba(255,255,255,0.93);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 2px 14px rgba(0,0,0,0.55),
    inset 0 1px 3px rgba(255,255,255,0.5);
}

.eight-text {
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 900;
  color: #07001c;
  line-height: 1;
  margin-top: 2px;
  letter-spacing: -0.02em;
}

/* ── Circular window (the eye) ── */
.eye-outer {
  position: absolute;
  bottom: 9%;
  left: 50%;
  transform: translateX(-50%);
  width: 44%;
  height: 44%;
  border-radius: 50%;
  background: #02000c;
  box-shadow:
    inset 0 0 22px rgba(0,0,0,0.9),
    inset 0 0  8px rgba(0,0,0,0.6),
    0 0 18px rgba(50,0,130,0.5);
}

.eye-inner {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Triangle ── */
.triangle {
  position: absolute;
  inset: 5%;
  clip-path: polygon(50% 6%, 4% 94%, 96% 94%);
  background: linear-gradient(168deg,
    #100045 0%,
    #1e0070 55%,
    #0f0040 100%);
  animation: tri-pulse 3.5s ease-in-out infinite;
}

@keyframes tri-pulse {
  0%, 100% {
    filter:
      drop-shadow(0 0 5px  rgba(110,55,255,0.65))
      drop-shadow(0 0 12px rgba(60,10,200,0.35));
  }
  50% {
    filter:
      drop-shadow(0 0 9px  rgba(130,75,255,0.9))
      drop-shadow(0 0 20px rgba(80,20,220,0.55));
  }
}

/* Triangle edge highlight (bright inner rim) */
.triangle::after {
  content: '';
  position: absolute;
  inset: 0;
  clip-path: polygon(
    50% 8%,   46% 14%,   50% 10%,   54% 14%,
    94% 92%,  88% 90%,   94% 90%,
    6%  92%,  6%  90%,   12% 90%,   6% 92%
  );
  background: rgba(140,100,255,0.15);
}

/* ── Answer text (inside eye) ── */
.answer {
  position: relative;
  z-index: 2;
  color: #9dd4ff;
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(0.52rem, 1.3vw, 0.68rem);
  line-height: 1.5;
  text-align: center;
  padding: 12% 12% 20%;
  width: 100%;
  opacity: 0;
  text-shadow:
    0 0 8px  rgba(140,210,255,0.7),
    0 0 16px rgba(100,170,255,0.4);
}

.answer.revealed {
  animation: text-rise 1.4s ease-out forwards;
}

@keyframes text-rise {
  0%   { opacity: 0; filter: blur(6px); transform: translateY(5px); }
  35%  { opacity: 0; filter: blur(4px); }
  70%  { opacity: 0.7; filter: blur(1px); }
  100% { opacity: 1; filter: blur(0); transform: translateY(0); }
}

/* ── Fog overlay (hides text, clears on reveal) ── */
.fog {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 60%,
    #130050 20%,
    #07001e 65%,
    #02000a 100%);
  z-index: 3;
  pointer-events: none;
}

.fog.swirling {
  animation: fog-swirl 0.6s ease-in forwards;
}

.fog.clearing {
  animation: fog-clear 1.1s ease-out forwards;
}

@keyframes fog-swirl {
  0%   { opacity: 1; transform: rotate(0deg) scale(1); }
  100% { opacity: 1; transform: rotate(180deg) scale(1.1); }
}

@keyframes fog-clear {
  0%   { opacity: 1; transform: scale(1.05); }
  40%  { opacity: 0.6; }
  100% { opacity: 0; transform: scale(1); }
}

/* ── Category + counter below ball ── */
.below-ball {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-height: 40px;
}

.category-reveal {
  font-size: 0.62rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(140,100,220,0);
  transition: color 0.8s ease 0.6s;
}

.category-reveal.shown {
  color: rgba(140,100,220,0.65);
}

/* ── Bottom controls ── */
.controls {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.instruction {
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(160,120,220,0.4);
  animation: hint-pulse 3s ease-in-out infinite;
}

@keyframes hint-pulse {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 0.8; }
}

.counter {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: rgba(120,80,180,0.35);
}

/* Progress arc (subtle) */
.progress-wrap {
  width: 140px;
  height: 3px;
  background: rgba(80,30,160,0.2);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #4010a0, #8040ff, #4010a0);
  background-size: 200%;
  border-radius: 3px;
  transition: width 0.5s ease;
  animation: progress-sheen 3s linear infinite;
}

@keyframes progress-sheen {
  0%   { background-position: 0%; }
  100% { background-position: 200%; }
}
</style>
</head>
<body>

<!-- Starfield (built by JS) -->
<div class="stars" id="stars"></div>

<p class="title">✦ &nbsp; design review &nbsp; ✦</p>

<div class="ball-scene">

  <div class="ball-wrap" id="ballWrap">
    <div class="ball" id="ball">

      <div class="eight-wrap">
        <span class="eight-text">8</span>
      </div>

      <div class="eye-outer">
        <div class="eye-inner">
          <div class="triangle"></div>
          <div class="answer" id="answer"></div>
          <div class="fog" id="fog"></div>
        </div>
      </div>

    </div>
  </div>

  <div class="below-ball">
    <div class="category-reveal" id="catLabel"></div>
  </div>

</div>

<div class="controls">
  <div class="instruction" id="instruction">click &nbsp;·&nbsp; shake &nbsp;·&nbsp; reveal</div>
  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="counter" id="counter">&nbsp;</div>
</div>

<script>
// ── Starfield ──────────────────────────────────────────────────────────────
(function() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = 0.8 + Math.random() * 1.8;
    s.style.cssText = [
      `width:${sz}px`, `height:${sz}px`,
      `top:${Math.random()*100}%`, `left:${Math.random()*100}%`,
      `--d:${1.5 + Math.random()*3.5}s`,
      `--delay:-${Math.random()*4}s`,
      `opacity:${0.05 + Math.random()*0.3}`,
    ].join(';');
    container.appendChild(s);
  }
})();

// ── Questions ──────────────────────────────────────────────────────────────
const ALL = [
  { t:"What made you choose this color palette?",                            c:"Design & Visual Choices" },
  { t:"Why did you pick this font pairing?",                                 c:"Design & Visual Choices" },
  { t:"What's the visual hierarchy you're trying to establish?",             c:"Design & Visual Choices" },
  { t:"Why this layout over a different one?",                               c:"Design & Visual Choices" },
  { t:"What was the hardest design decision you made?",                      c:"Design & Visual Choices" },
  { t:"How did you decide what to feature first?",                           c:"Design & Visual Choices" },
  { t:"What's one design choice you're unsure about?",                       c:"Design & Visual Choices" },
  { t:"Why did you frame the product this way?",                             c:"Design & Visual Choices" },
  { t:"How are you using white space here?",                                 c:"Design & Visual Choices" },
  { t:"What's the focal point, and how are you guiding the eye to it?",     c:"Design & Visual Choices" },
  { t:"What mood are you trying to create visually?",                        c:"Design & Visual Choices" },
  { t:"Why this style over a more minimal or maximal approach?",             c:"Design & Visual Choices" },
  { t:"What's the role of contrast in this design?",                         c:"Design & Visual Choices" },
  { t:"How did you decide on image vs. graphic vs. text-heavy?",             c:"Design & Visual Choices" },
  { t:"What design element are you most proud of?",                          c:"Design & Visual Choices" },
  { t:"How does this reflect the brand's personality?",                      c:"Brand Identity & Voice" },
  { t:"If the brand were a person, who would it be?",                        c:"Brand Identity & Voice" },
  { t:"What's one thing you want shoppers to feel immediately?",             c:"Brand Identity & Voice" },
  { t:"How did the brand guide influence your choices?",                     c:"Brand Identity & Voice" },
  { t:"Where did you push the brand guide vs. stick to it?",                c:"Brand Identity & Voice" },
  { t:"What does this brand do that competitors don't?",                     c:"Brand Identity & Voice" },
  { t:"How would you describe the brand voice in three words?",              c:"Brand Identity & Voice" },
  { t:"What part of the brand story are you telling here?",                 c:"Brand Identity & Voice" },
  { t:"Does this feel on-brand or like a stretch?",                          c:"Brand Identity & Voice" },
  { t:"What's the brand's biggest visual signature?",                        c:"Brand Identity & Voice" },
  { t:"Who is the customer you pictured while designing this?",              c:"Customer & Audience" },
  { t:"What problem are they trying to solve?",                              c:"Customer & Audience" },
  { t:"What do they need to see in the first 3 seconds?",                   c:"Customer & Audience" },
  { t:"What objection might they have?",                                     c:"Customer & Audience" },
  { t:"Where in the buying journey are they?",                               c:"Customer & Audience" },
  { t:"What emotion are you trying to evoke?",                               c:"Customer & Audience" },
  { t:"What competitor might they have just come from?",                     c:"Customer & Audience" },
  { t:"What does this customer care about most?",                            c:"Customer & Audience" },
  { t:"What would make them trust this brand?",                              c:"Customer & Audience" },
  { t:"What's their biggest hesitation before buying?",                      c:"Customer & Audience" },
  { t:"What's the single most important takeaway?",                          c:"Product & Content Strategy" },
  { t:"Why this order?",                                                     c:"Product & Content Strategy" },
  { t:"What did you intentionally leave out?",                               c:"Product & Content Strategy" },
  { t:"How does the A+ build on the image stack instead of repeating it?",  c:"Product & Content Strategy" },
  { t:"What's the \"aha\" moment you're designing for?",                    c:"Product & Content Strategy" },
  { t:"Would a shopper know enough to buy from just the cover and bullets?", c:"Product & Content Strategy" },
  { t:"How are you differentiating from competitors?",                       c:"Product & Content Strategy" },
  { t:"What's the strongest selling point, and is it loud enough?",         c:"Product & Content Strategy" },
  { t:"What's the weakest selling point, and how are you handling it?",     c:"Product & Content Strategy" },
  { t:"What did you prioritize, and what did you sacrifice?",               c:"Product & Content Strategy" },
  { t:"How does the copy support what the design is doing?",                c:"Copy & Design Together" },
  { t:"Is there anywhere copy and design are saying different things?",     c:"Copy & Design Together" },
  { t:"What's the headline doing for the image?",                            c:"Copy & Design Together" },
  { t:"Where is design carrying the message vs. copy?",                     c:"Copy & Design Together" },
  { t:"Is the copy doing too much or not enough?",                          c:"Copy & Design Together" },
  { t:"What's the tone of the copy, and does the design match it?",        c:"Copy & Design Together" },
  { t:"Where could copy be cut without losing meaning?",                    c:"Copy & Design Together" },
  { t:"Where could design be simplified without losing impact?",            c:"Copy & Design Together" },
  { t:"What inspired this?",                                                c:"Self-Reflection & Process" },
  { t:"What did you try first that didn't work?",                          c:"Self-Reflection & Process" },
  { t:"What would you change with another day on it?",                     c:"Self-Reflection & Process" },
  { t:"What are you most proud of?",                                        c:"Self-Reflection & Process" },
  { t:"What feedback are you specifically hoping for?",                     c:"Self-Reflection & Process" },
  { t:"If you had to cut one element, what goes?",                         c:"Self-Reflection & Process" },
  { t:"What's something you'd never done before on this one?",             c:"Self-Reflection & Process" },
  { t:"What rule did you break, and was it worth it?",                     c:"Self-Reflection & Process" },
  { t:"What's the part you're least sure about?",                          c:"Self-Reflection & Process" },
  { t:"What surprised you while working on this?",                         c:"Self-Reflection & Process" },
  { t:"What took longer than you expected?",                               c:"Self-Reflection & Process" },
  { t:"What came easier than you expected?",                               c:"Self-Reflection & Process" },
  { t:"How does this hold up on mobile?",                                  c:"Flow & Experience" },
  { t:"Where might someone click off, and why?",                           c:"Flow & Experience" },
  { t:"Does the flow feel intentional?",                                   c:"Flow & Experience" },
  { t:"What's the weakest link in the journey?",                           c:"Flow & Experience" },
  { t:"What's the first thing the eye lands on?",                          c:"Flow & Experience" },
  { t:"What's the last thing someone sees before deciding?",               c:"Flow & Experience" },
  { t:"Is there anywhere the pacing feels off?",                           c:"Flow & Experience" },
  { t:"Where does the listing lose momentum?",                             c:"Flow & Experience" },
  { t:"Where does it pick up?",                                            c:"Flow & Experience" },
  { t:"What's a choice you made that you'd defend hardest?",               c:"Decision-Making" },
  { t:"What's a choice you'd reconsider?",                                 c:"Decision-Making" },
  { t:"What did the brand push for that you weren't sure about?",          c:"Decision-Making" },
  { t:"What did you push for that the brand wasn't sure about?",           c:"Decision-Making" },
  { t:"What constraint shaped this the most?",                             c:"Decision-Making" },
  { t:"What would you do if you had no constraints?",                      c:"Decision-Making" },
  { t:"What did you almost include but didn't?",                           c:"Decision-Making" },
  { t:"What's something you included that you almost didn't?",             c:"Decision-Making" },
  { t:"What's this listing's job?",                                        c:"Big Picture" },
  { t:"What's the one thing it has to do well?",                           c:"Big Picture" },
  { t:"What does success look like for this?",                             c:"Big Picture" },
  { t:"How will you know if it's working?",                                c:"Big Picture" },
  { t:"What's the story this listing tells?",                              c:"Big Picture" },
  { t:"What's the feeling you want someone to walk away with?",            c:"Big Picture" },
  { t:"If this were a billboard, what's the message?",                     c:"Big Picture" },
  { t:"What does this say about the brand at a glance?",                   c:"Big Picture" },
  { t:"If you had to explain this in one sentence, what would you say?",   c:"Curveballs" },
  { t:"What would make you scroll past this in search?",                   c:"Curveballs" },
  { t:"If this product were a movie poster, what's the tagline?",          c:"Curveballs" },
  { t:"What's the most \"you\" thing about this design?",                  c:"Curveballs" },
  { t:"What's the least \"you\" thing about this design?",                 c:"Curveballs" },
  { t:"If a competitor saw this, what would worry them?",                  c:"Curveballs" },
  { t:"What's something here only you would notice?",                      c:"Curveballs" },
  { t:"What's the riskiest thing about this listing?",                     c:"Curveballs" },
  { t:"What's the safest thing, and is that a problem?",                   c:"Curveballs" },
  { t:"If you had to start over tomorrow, what would you keep?",           c:"Curveballs" },
];

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

// ── State ──────────────────────────────────────────────────────────────────
let deck   = shuffle(ALL);
let idx    = 0;
let busy   = false;

const ballWrap    = document.getElementById('ballWrap');
const answerEl    = document.getElementById('answer');
const fogEl       = document.getElementById('fog');
const catLabel    = document.getElementById('catLabel');
const instruction = document.getElementById('instruction');
const progressFill= document.getElementById('progressFill');
const counterEl   = document.getElementById('counter');

// ── Core reveal logic ──────────────────────────────────────────────────────
function reveal() {
  if (busy) return;
  busy = true;

  // Reset previous state
  answerEl.classList.remove('revealed');
  answerEl.style.opacity = '0';
  catLabel.classList.remove('shown');
  fogEl.classList.remove('swirling', 'clearing');
  fogEl.style.opacity = '1';

  // Start shake
  ballWrap.classList.remove('shaking');
  void ballWrap.offsetWidth; // reflow to restart animation
  ballWrap.classList.add('shaking');

  // Swirl the fog during shake
  setTimeout(() => {
    fogEl.classList.add('swirling');
  }, 80);

  setTimeout(() => {
    // Advance deck
    if (idx >= deck.length - 1) { deck = shuffle(ALL); idx = 0; }
    else idx++;

    const q = deck[idx];
    answerEl.textContent = q.t;
    catLabel.textContent  = q.c;

    // Clear fog
    fogEl.classList.remove('swirling');
    fogEl.classList.add('clearing');

    // Rise text
    setTimeout(() => {
      answerEl.classList.add('revealed');
      catLabel.classList.add('shown');
    }, 300);

    // After fog fully gone, reset it (hidden via opacity)
    setTimeout(() => {
      fogEl.style.opacity = '0';
      fogEl.classList.remove('clearing');
    }, 1100);

    // Update UI
    progressFill.style.width = `${((idx + 1) / deck.length) * 100}%`;
    counterEl.textContent    = `${idx + 1} · ${deck.length}`;
    instruction.textContent  = 'click · shake · ask again';

    ballWrap.classList.remove('shaking');
    busy = false;

  }, 700);
}

// ── Click / tap ────────────────────────────────────────────────────────────
ballWrap.addEventListener('click', reveal);

// ── Keyboard ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ([' ', 'Enter', 'ArrowRight'].includes(e.key)) { e.preventDefault(); reveal(); }
});

// ── Device shake (mobile) ──────────────────────────────────────────────────
let lastShake = 0;
let prevAcc = { x: 0, y: 0, z: 0 };

function onMotion(e) {
  const acc = e.accelerationIncludingGravity;
  if (!acc) return;
  const now = Date.now();
  if (now - lastShake < 1000) return;

  const dx = Math.abs((acc.x || 0) - prevAcc.x);
  const dy = Math.abs((acc.y || 0) - prevAcc.y);
  const dz = Math.abs((acc.z || 0) - prevAcc.z);

  if (dx + dy + dz > 28) {
    lastShake = now;
    reveal();
  }

  prevAcc = { x: acc.x || 0, y: acc.y || 0, z: acc.z || 0 };
}

// Request permission on iOS 13+
if (typeof DeviceMotionEvent !== 'undefined' &&
    typeof DeviceMotionEvent.requestPermission === 'function') {
  document.addEventListener('click', function askPerm() {
    DeviceMotionEvent.requestPermission()
      .then(r => { if (r === 'granted') window.addEventListener('devicemotion', onMotion); })
      .catch(() => {});
    document.removeEventListener('click', askPerm);
  }, { once: true });
} else {
  window.addEventListener('devicemotion', onMotion);
}
</script>
</body>
</html>
