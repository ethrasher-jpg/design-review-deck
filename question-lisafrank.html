<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Design Questions ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Lilita+One&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Deep space / holographic background ── */
body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 18% 28%, rgba(140,0,255,0.28) 0%, transparent 52%),
    radial-gradient(ellipse at 82% 68%, rgba(255,20,147,0.22) 0%, transparent 48%),
    radial-gradient(ellipse at 60% 10%, rgba(0,200,255,0.18) 0%, transparent 42%),
    radial-gradient(ellipse at 40% 85%, rgba(57,255,20,0.12) 0%, transparent 40%),
    #07001a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  position: relative;
  overflow: hidden;
  font-family: 'Fredoka One', cursive;
}

/* Animated holographic shimmer layer */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: linear-gradient(
    118deg,
    transparent 0%,
    rgba(255,20,147,0.07) 18%,
    rgba(0,255,255,0.09) 35%,
    transparent 48%,
    rgba(191,0,255,0.07) 62%,
    rgba(57,255,20,0.06) 78%,
    transparent 100%
  );
  background-size: 300% 300%;
  animation: holo-sweep 7s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}

@keyframes holo-sweep {
  0%   { background-position: 0% 0%;    opacity: 0.5; }
  33%  { background-position: 100% 40%; opacity: 1;   }
  66%  { background-position: 40% 100%; opacity: 0.6; }
  100% { background-position: 0% 100%;  opacity: 1;   }
}

/* ── Floating background critters ── */
.bg-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.floater {
  position: absolute;
  user-select: none;
  line-height: 1;
}

.floater.dolphin {
  filter: drop-shadow(0 0 8px rgba(0,255,255,0.7)) drop-shadow(0 0 16px rgba(0,200,255,0.4));
  animation: swim var(--dur) ease-in-out infinite var(--delay);
}

.floater.star {
  filter: drop-shadow(0 0 5px rgba(255,255,150,0.9));
  animation: twinkle var(--dur) ease-in-out infinite alternate var(--delay);
}

.floater.sparkle {
  filter: drop-shadow(0 0 4px var(--c));
  animation: spin-glow var(--dur) linear infinite var(--delay);
  color: var(--c);
}

@keyframes swim {
  0%,100% { transform: translateY(0)    rotate(var(--tilt)); }
  50%      { transform: translateY(-22px) rotate(calc(var(--tilt) + 14deg)); }
}

@keyframes twinkle {
  0%   { opacity: 0.1; transform: scale(0.6) rotate(0deg); }
  100% { opacity: 1;   transform: scale(1.3) rotate(25deg); }
}

@keyframes spin-glow {
  0%   { transform: rotate(0deg)   scale(1);    opacity: 0.7; }
  50%  { transform: rotate(180deg) scale(1.4);  opacity: 1;   }
  100% { transform: rotate(360deg) scale(1);    opacity: 0.7; }
}

/* ── Shared rainbow scroll ── */
@keyframes rainbow-scroll {
  0%   { background-position: 0%;   }
  100% { background-position: 300%; }
}

/* ── Page layout ── */
.page {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 26px;
  width: 100%;
  max-width: 500px;
}

/* ── Title ── */
.page-title {
  font-family: 'Lilita One', cursive;
  font-size: clamp(1.8rem, 6vw, 3rem);
  text-align: center;
  line-height: 1.15;
  background: linear-gradient(90deg,
    #ff1493, #ff6600, #ffe600,
    #39ff14, #00ffff, #bf00ff, #ff1493
  );
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbow-scroll 3s linear infinite;
  filter:
    drop-shadow(0 0 14px rgba(255,20,147,0.65))
    drop-shadow(0 0 28px rgba(0,255,255,0.35));
}

.title-sub {
  display: block;
  font-family: 'Fredoka One', cursive;
  font-size: clamp(0.8rem, 2.5vw, 1.1rem);
  background: linear-gradient(90deg,
    #bf00ff, #00ffff, #ff1493, #bf00ff
  );
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbow-scroll 4s linear infinite reverse;
  letter-spacing: 0.12em;
  margin-top: 4px;
  filter: drop-shadow(0 0 8px rgba(191,0,255,0.6));
}

/* ── Card ── */
.card-outer {
  width: 100%;
  transform-origin: center center;
}

.card-outer.exiting {
  animation: card-out 0.2s cubic-bezier(0.4,0,1,1) forwards;
}

.card-outer.entering {
  animation: card-in 0.52s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

@keyframes card-out {
  0%   { transform: scale(1) rotate(0deg);    opacity: 1; }
  100% { transform: scale(0.72) rotate(-9deg); opacity: 0; }
}

@keyframes card-in {
  0%   { transform: scale(0.55) rotate(11deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg);     opacity: 1; }
}

/* Animated rainbow border via gradient padding */
.card-border {
  padding: 5px;
  border-radius: 30px;
  background: linear-gradient(135deg,
    #ff1493, #ff6600, #ffe600,
    #39ff14, #00ffff, #bf00ff, #ff1493
  );
  background-size: 300%;
  animation: rainbow-scroll 2.5s linear infinite;
  box-shadow:
    0 0 22px  rgba(255,20,147,0.6),
    0 0 44px  rgba(0,255,255,0.35),
    0 0 80px  rgba(191,0,255,0.28),
    0 14px 48px rgba(0,0,0,0.6);
}

.card-inner {
  background: #fff;
  border-radius: 25px;
  padding: 34px 30px 26px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  min-height: 280px;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Holographic sheen inside the white card */
.card-inner::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 25px;
  background: linear-gradient(
    135deg,
    rgba(255,105,180,0.08) 0%,
    rgba(255,255,255,0) 35%,
    rgba(0,255,255,0.07) 65%,
    rgba(191,0,255,0.06) 100%
  );
  background-size: 200% 200%;
  animation: card-sheen 5s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes card-sheen {
  0%   { background-position: 0% 0%;     }
  100% { background-position: 100% 100%; }
}

/* Category badge */
.cat-badge {
  font-family: 'Fredoka One', cursive;
  font-size: 0.82rem;
  letter-spacing: 0.05em;
  padding: 5px 20px;
  border-radius: 50px;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  background: var(--badge-bg, linear-gradient(90deg,#ff1493,#bf00ff));
  box-shadow: 0 0 16px var(--badge-glow, rgba(255,20,147,0.8)), 0 2px 8px rgba(0,0,0,0.2);
  white-space: nowrap;
  position: relative;
  z-index: 1;
}

/* Question text — dark rainbow so it's readable on white */
.question-text {
  font-family: 'Lilita One', cursive;
  font-size: clamp(1.25rem, 4vw, 1.85rem);
  line-height: 1.35;
  text-align: center;
  background: linear-gradient(135deg,
    #c4006a, #c44000, #7a5500,
    #006600, #005f7a, #5000c4, #c4006a
  );
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbow-scroll 6s linear infinite;
  position: relative;
  z-index: 1;
}

/* Emoji decorations row */
.card-deco {
  font-size: 1.5rem;
  letter-spacing: 0.25em;
  position: relative;
  z-index: 1;
  animation: deco-bob 2.2s ease-in-out infinite alternate;
  filter:
    drop-shadow(0 0 5px rgba(255,100,200,0.7))
    drop-shadow(0 0 10px rgba(0,255,255,0.4));
}

@keyframes deco-bob {
  0%   { transform: translateY(0) scale(1); }
  100% { transform: translateY(-5px) scale(1.06); }
}

/* ── Next button ── */
.next-btn {
  font-family: 'Fredoka One', cursive;
  font-size: 1.25rem;
  letter-spacing: 0.04em;
  padding: 16px 48px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg,
    #ff1493, #ff6600, #ffe600,
    #39ff14, #00ffff, #bf00ff, #ff1493
  );
  background-size: 300%;
  color: #fff;
  text-shadow: 0 2px 6px rgba(0,0,0,0.4);
  cursor: pointer;
  animation: rainbow-scroll 2.5s linear infinite;
  box-shadow:
    0 0 22px  rgba(255,20,147,0.7),
    0 0 44px  rgba(0,255,255,0.35),
    0 8px 24px rgba(0,0,0,0.45);
  transition: transform 0.14s ease, box-shadow 0.14s ease;
  position: relative;
}

.next-btn::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 54px;
  background: inherit;
  background-size: inherit;
  animation: inherit;
  filter: blur(12px);
  opacity: 0.5;
  z-index: -1;
}

.next-btn:hover:not(:disabled) {
  transform: translateY(-4px) scale(1.04);
  box-shadow:
    0 0 34px rgba(255,20,147,0.9),
    0 0 68px rgba(0,255,255,0.5),
    0 14px 36px rgba(0,0,0,0.45);
}

.next-btn:active:not(:disabled) {
  transform: translateY(0) scale(0.96);
}

.next-btn:disabled { opacity: 0.35; cursor: default; transform: none; }

/* ── Progress ── */
.progress-wrap {
  width: 220px;
  height: 6px;
  background: rgba(255,255,255,0.12);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 0 8px rgba(191,0,255,0.3);
}

.progress-fill {
  height: 100%;
  border-radius: 6px;
  background: linear-gradient(90deg, #ff1493, #00ffff, #bf00ff, #ff1493);
  background-size: 300%;
  animation: rainbow-scroll 2s linear infinite;
  transition: width 0.4s ease;
}

/* ── Counter ── */
.counter {
  font-size: 0.95rem;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.12em;
  text-shadow: 0 0 10px rgba(255,100,200,0.4);
}

/* ── Hint ── */
.hint {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.22);
  letter-spacing: 0.14em;
}
</style>
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>

<div class="page">

  <h1 class="page-title">
    ✦ Design Questions ✦
    <span class="title-sub">🐬 &nbsp; a lisa frank experience &nbsp; 🐬</span>
  </h1>

  <div class="card-outer" id="cardOuter">
    <div class="card-border">
      <div class="card-inner">
        <div class="cat-badge" id="catBadge"></div>
        <p class="question-text" id="questionText"></p>
        <div class="card-deco" id="cardDeco">🐬 ✦ 🌟</div>
      </div>
    </div>
  </div>

  <button class="next-btn" id="nextBtn">✦ Next Question ✦</button>

  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="counter" id="counter"></div>
  <div class="hint">space or → to advance</div>

</div>

<script>

// ── Questions ──────────────────────────────────────────────────────────────
const ALL = [
  { t:"What made you choose this color palette?", c:"Design & Visual Choices" },
  { t:"Why did you pick this font pairing?", c:"Design & Visual Choices" },
  { t:"What's the visual hierarchy you're trying to establish?", c:"Design & Visual Choices" },

  { t:"How does the copy support what the design is doing?", c:"Copy & Design Together" },

  "🐬 ✦ 🌟",  "🌈 💖 ⭐",  "🦄 ✨ 💎",

// ── Build floating background layer ───────────────────────────────────────
(function buildBg() {
  const layer = document.getElementById('bgLayer');

  const dolphins = [
    { top:"8%",  left:"4%",  size:"2.4rem", dur:"4.8s", delay:"0s",    tilt:"-8deg"  },
    { top:"72%", left:"7%",  size:"1.8rem", dur:"5.5s", delay:"1.2s",  tilt:"-12deg" },
    { top:"20%", left:"88%", size:"2.8rem", dur:"4.2s", delay:"0.5s",  tilt:"8deg"   },
    { top:"60%", left:"85%", size:"2rem",   dur:"6s",   delay:"2.1s",  tilt:"5deg"   },
    { top:"45%", left:"2%",  size:"1.5rem", dur:"5.2s", delay:"3s",    tilt:"-6deg"  },
    { top:"85%", left:"55%", size:"2.2rem", dur:"4.6s", delay:"1.8s",  tilt:"-4deg"  },
    { top:"5%",  left:"50%", size:"1.6rem", dur:"5.8s", delay:"0.8s",  tilt:"10deg"  },
  ];

  dolphins.forEach(d => {
    const el = document.createElement('div');
    el.className = 'floater dolphin';
    el.textContent = '🐬';
    el.style.cssText = `top:${d.top};left:${d.left};font-size:${d.size};--dur:${d.dur};--delay:${d.delay};--tilt:${d.tilt};`;
    layer.appendChild(el);
  });

  // Stars — scatter all over
  const starEmoji = ['⭐','🌟','✨','💫'];
  const neonCols  = ['#ff69b4','#00ffff','#bf00ff','#39ff14','#ffe600','#ff6600'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    const isStar = Math.random() > 0.35;
    el.className = `floater ${isStar ? 'star' : 'sparkle'}`;
    el.textContent = isStar
      ? starEmoji[Math.floor(Math.random() * starEmoji.length)]
      : ['✦','✧','★','✶','✸'][Math.floor(Math.random() * 5)];
    el.style.cssText = [
      `top:${2 + Math.random() * 94}%`,
      `left:${1 + Math.random() * 96}%`,
      `font-size:${0.7 + Math.random() * 1.4}rem`,
      `--dur:${1.4 + Math.random() * 2.8}s`,
      `--delay:-${Math.random() * 3}s`,
      `--c:${neonCols[Math.floor(Math.random() * neonCols.length)]}`,
    ].join(';');
    layer.appendChild(el);
  }

  // Extras
  ['🌈','💎','🎀','💖','🦋','🌸'].forEach((emoji, i) => {
    const el = document.createElement('div');
    el.className = 'floater star';
    el.textContent = emoji;
    el.style.cssText = `top:${15 + i * 14}%;left:${i % 2 === 0 ? 93 : 3}%;font-size:${1.2 + Math.random()}rem;--dur:${3 + i * 0.4}s;--delay:-${i * 0.7}s;`;
    layer.appendChild(el);
  });
})();

// ── App state ──────────────────────────────────────────────────────────────
function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

let deck = shuffle(ALL);
let idx  = 0;
let busy = false;

const cardOuter   = document.getElementById('cardOuter');
const catBadge    = document.getElementById('catBadge');
const questionText= document.getElementById('questionText');
const cardDeco    = document.getElementById('cardDeco');
const nextBtn     = document.getElementById('nextBtn');
const progressFill= document.getElementById('progressFill');
const counter     = document.getElementById('counter');

function render() {
  const q    = deck[idx];
  const meta = CAT_META[q.c];

  catBadge.textContent          = q.c;
  catBadge.style.background     = meta.bg;
  catBadge.style.setProperty('--badge-glow', meta.glow);
  catBadge.style.boxShadow      = `0 0 16px ${meta.glow}, 0 2px 8px rgba(0,0,0,0.2)`;

  questionText.textContent = q.t;
  cardDeco.textContent     = DECOS[Math.floor(Math.random() * DECOS.length)];

  progressFill.style.width = `${((idx + 1) / deck.length) * 100}%`;
  counter.textContent      = `${idx + 1} / ${deck.length}`;

  const isLast = idx >= deck.length - 1;
  nextBtn.textContent = isLast ? '✦ Reshuffle ✦' : '✦ Next Question ✦';
}

function next() {
  if (busy) return;
  busy = true;
  nextBtn.disabled = true;

  cardOuter.classList.remove('entering');
  cardOuter.classList.add('exiting');

  setTimeout(() => {
    if (idx >= deck.length - 1) { deck = shuffle(ALL); idx = 0; }
    else idx++;

    render();
    cardOuter.classList.remove('exiting');
    void cardOuter.offsetWidth; // force reflow
    cardOuter.classList.add('entering');

    setTimeout(() => {
      cardOuter.classList.remove('entering');
      busy = false;
      nextBtn.disabled = false;
    }, 520);
  }, 200);
}

nextBtn.addEventListener('click', next);
document.addEventListener('keydown', e => {
  if ([' ','ArrowRight','Enter'].includes(e.key)) { e.preventDefault(); next(); }
});

render();
</script>
</body>
