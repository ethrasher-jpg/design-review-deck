<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortune Cookie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: radial-gradient(ellipse at 50% 38%, #FFF4DC 0%, #F5E2B8 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  gap: 0;
  font-family: 'IM Fell English', Georgia, serif;
}

/* ── Title ── */
.page-title {
  font-size: 0.68rem;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  color: rgba(160, 80, 30, 0.55);
  font-style: italic;
  margin-bottom: 32px;
}

/* ── Scene ── */
.scene {
  position: relative;
  width: 300px;
  height: 260px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}

/* ── Cookie (two halves, stacked, centered in scene) ── */
.cookie-pair {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  animation: idle-rock 3.8s ease-in-out infinite;
}

@keyframes idle-rock {
  0%, 100% { transform: translate(-50%, -50%) rotate(-2deg);   }
  50%       { transform: translate(-50%, -50%) rotate( 2deg);   }
}

/* Shared half styles */
.cookie-top,
.cookie-bot {
  width: 148px;
  height: 62px;
  position: relative;
}

/* ── Top half ── */
.cookie-top {
  background:
    radial-gradient(ellipse at 38% 28%, rgba(255,235,140,0.55) 0%, transparent 60%),
    linear-gradient(155deg, #F8CB48 0%, #E49820 52%, #BC6E0E 100%);
  border-radius: 74px 74px 38px 38px / 62px 62px 24px 24px;
  box-shadow:
    inset 0  7px 18px rgba(255,225,100,0.5),
    inset 0 -4px  9px rgba(110,55,0,0.28),
    0 3px 10px rgba(160,85,10,0.2);
  transform-origin: center bottom;
}

/* crack highlight on inner edge */
.cookie-top::before {
  content: '';
  position: absolute;
  bottom: 0; left: 8%; right: 8%;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(90,40,0,0.22) 30%, rgba(90,40,0,0.22) 70%, transparent);
  border-radius: 0 0 50% 50%;
}

/* ── Bottom half ── */
.cookie-bot {
  background:
    radial-gradient(ellipse at 62% 72%, rgba(255,205,80,0.4) 0%, transparent 60%),
    linear-gradient(25deg, #A05C0C 0%, #D08018 52%, #ECA428 100%);
  border-radius: 38px 38px 74px 74px / 24px 24px 62px 62px;
  box-shadow:
    inset 0 -7px 18px rgba(255,200,80,0.4),
    inset 0  4px  9px rgba(110,55,0,0.32),
    0 -2px 8px rgba(160,85,10,0.12);
  transform-origin: center top;
}

.cookie-bot::before {
  content: '';
  position: absolute;
  top: 0; left: 8%; right: 8%;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(90,40,0,0.22) 30%, rgba(90,40,0,0.22) 70%, transparent);
  border-radius: 50% 50% 0 0;
}

/* subtle diagonal grain on both halves */
.cookie-top::after,
.cookie-bot::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: repeating-linear-gradient(
    -38deg,
    transparent 0px,
    transparent 9px,
    rgba(170,90,10,0.05) 9px,
    rgba(170,90,10,0.05) 10px
  );
}

/* ── Paper strip ── */
.paper {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 252px;
  background: #FEFCF0;
  border-top:    2px solid #C42020;
  border-bottom: 2px solid #C42020;
  padding: 11px 20px 9px;
  z-index: 3;
  pointer-events: none;
  /* starts collapsed to center */
  clip-path: inset(0 50% 0 50%);
  opacity: 0;
}

/* ── Fortune text ── */
.fortune-text {
  display: block;
  font-size: 0.92rem;
  line-height: 1.55;
  color: #1c1008;
  text-align: center;
  opacity: 0;
}

.fortune-cat {
  display: block;
  font-size: 0.58rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #C42020;
  text-align: center;
  margin-top: 7px;
  opacity: 0;
  font-style: normal;
}

/* ── CRACKED state — all animations trigger here ── */

/* Stop idle rock */
.scene.cracked .cookie-pair,
.scene.resetting .cookie-pair {
  animation: none;
}

/* Halves fly apart */
.scene.cracked .cookie-top {
  animation: fly-top 0.42s cubic-bezier(0.22, 0.68, 0, 1.2) forwards;
}
.scene.cracked .cookie-bot {
  animation: fly-bot 0.42s cubic-bezier(0.22, 0.68, 0, 1.2) forwards;
}

/* Paper unfurls */
.scene.cracked .paper {
  animation: unfurl 0.52s cubic-bezier(0.34, 1.46, 0.64, 1) 0.22s forwards;
}

/* Text materialises */
.scene.cracked .fortune-text {
  animation: text-rise 0.38s ease 0.6s forwards;
}
.scene.cracked .fortune-cat {
  animation: text-rise 0.32s ease 0.72s forwards;
}

@keyframes fly-top {
  0%   { transform: rotate(  0deg) translate(  0px,   0px); }
  15%  { transform: rotate( -4deg) translate( -4px,  -6px); } /* crack hesitation */
  100% { transform: rotate(-28deg) translate(-38px, -52px); }
}

@keyframes fly-bot {
  0%   { transform: rotate(  0deg) translate(  0px,   0px); }
  15%  { transform: rotate(  4deg) translate(  4px,   6px); }
  100% { transform: rotate( 28deg) translate( 38px,  52px); }
}

@keyframes unfurl {
  0%   { clip-path: inset(0 50% 0 50%); opacity: 1; }
  100% { clip-path: inset(0  0% 0  0%); opacity: 1; }
}

@keyframes text-rise {
  0%   { opacity: 0; transform: translateY(4px); }
  100% { opacity: 1; transform: translateY(0);   }
}

/* ── RESETTING state ── */
.scene.resetting .fortune-text,
.scene.resetting .fortune-cat {
  opacity: 0;
  transition: opacity 0.12s ease;
}

.scene.resetting .cookie-top {
  animation: return-top 0.28s ease-in forwards;
}
.scene.resetting .cookie-bot {
  animation: return-bot 0.28s ease-in forwards;
}
.scene.resetting .paper {
  animation: roll-up 0.22s ease-in forwards;
}

@keyframes return-top {
  from { transform: rotate(-28deg) translate(-38px, -52px); }
  to   { transform: rotate(  0deg) translate(  0px,   0px); }
}
@keyframes return-bot {
  from { transform: rotate( 28deg) translate( 38px,  52px); }
  to   { transform: rotate(  0deg) translate(  0px,   0px); }
}
@keyframes roll-up {
  from { clip-path: inset(0  0% 0  0%); opacity: 1; }
  to   { clip-path: inset(0 50% 0 50%); opacity: 0; }
}

/* ── Bottom controls ── */
.hint {
  font-size: 0.64rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(160, 80, 30, 0.55);
  font-style: italic;
  margin-top: 8px;
  animation: hint-breathe 3s ease-in-out infinite;
}

@keyframes hint-breathe {
  0%, 100% { opacity: 0.55; }
  50%       { opacity: 0.9;  }
}

.counter {
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  color: rgba(160, 80, 30, 0.38);
  margin-top: 6px;
  min-height: 1em;
}
</style>
</head>
<body>

<p class="page-title">fortune cookie</p>

<div class="scene" id="scene">

  <div class="cookie-pair" id="cookiePair">
    <div class="cookie-top"></div>
    <div class="cookie-bot"></div>
  </div>

  <div class="paper" id="paper">
    <span class="fortune-text" id="fortuneText"></span>
    <span class="fortune-cat"  id="fortuneCat"></span>
  </div>

</div>

<p class="hint" id="hint">tap to crack open</p>
<p class="counter" id="counter"></p>

<script>
const ALL = [

  { t:"Where did you push the brand guide vs. stick to it?",                c:"Brand Identity & Voice" },

  { t:"How would you describe the brand voice in three words?",              c:"Brand Identity & Voice" },
  { t:"What part of the brand story are you telling here?",                 c:"Brand Identity & Voice" },
  { t:"Does this feel on-brand or like a stretch?",                          c:"Brand Identity & Voice" },
  { t:"What's the brand's biggest visual signature?",                        c:"Brand Identity & Voice" },
  { t:"Who is the customer you pictured while designing this?",              c:"Customer & Audience" },
  { t:"What problem are they trying to solve?",                              c:"Customer & Audience" },
  { t:"What do they need to see in the first 3 seconds?",                   c:"Customer & Audience" },
  { t:"What objection might they have?",                                     c:"Customer & Audience" },
  { t:"Where in the buying journey are they?",                               c:"Customer & Audience" },
  { t:"What emotion are you trying to evoke?",                               c:"Customer & Audience" },
  { t:"What competitor might they have just come from?",                     c:"Customer & Audience" },
  { t:"What does this customer care about most?",                            c:"Customer & Audience" },
  { t:"What would make them trust this brand?",                              c:"Customer & Audience" },
  { t:"What's their biggest hesitation before buying?",                      c:"Customer & Audience" },
  { t:"What's the single most important takeaway?",                          c:"Product & Content Strategy" },
  { t:"Why this order?",                                                     c:"Product & Content Strategy" },
  { t:"What did you intentionally leave out?",                               c:"Product & Content Strategy" },
  { t:"How does the A+ build on the image stack instead of repeating it?",  c:"Product & Content Strategy" },
  { t:"What's the \"aha\" moment you're designing for?",                    c:"Product & Content Strategy" },
  { t:"Would a shopper know enough to buy from just the cover and bullets?", c:"Product & Content Strategy" },
  { t:"How are you differentiating from competitors?",                       c:"Product & Content Strategy" },
  { t:"What's the strongest selling point, and is it loud enough?",         c:"Product & Content Strategy" },
  { t:"What's the weakest selling point, and how are you handling it?",     c:"Product & Content Strategy" },
  { t:"What did you prioritize, and what did you sacrifice?",               c:"Product & Content Strategy" },
  { t:"How does the copy support what the design is doing?",                c:"Copy & Design Together" },
  { t:"Is there anywhere copy and design are saying different things?",     c:"Copy & Design Together" },
  { t:"What's the headline doing for the image?",                            c:"Copy & Design Together" },
  { t:"Where is design carrying the message vs. copy?",                     c:"Copy & Design Together" },
  { t:"Is the copy doing too much or not enough?",                          c:"Copy & Design Together" },
  { t:"What's the tone of the copy, and does the design match it?",        c:"Copy & Design Together" },
  { t:"Where could copy be cut without losing meaning?",                    c:"Copy & Design Together" },
  { t:"Where could design be simplified without losing impact?",            c:"Copy & Design Together" },
  { t:"What inspired this?",                                                c:"Self-Reflection & Process" },
  { t:"What did you try first that didn't work?",                          c:"Self-Reflection & Process" },
  { t:"What would you change with another day on it?",                     c:"Self-Reflection & Process" },
  { t:"What are you most proud of?",                                        c:"Self-Reflection & Process" },
  { t:"What feedback are you specifically hoping for?",                     c:"Self-Reflection & Process" },
  { t:"If you had to cut one element, what goes?",                         c:"Self-Reflection & Process" },
  { t:"What's something you'd never done before on this one?",             c:"Self-Reflection & Process" },
  { t:"What rule did you break, and was it worth it?",                     c:"Self-Reflection & Process" },
  { t:"What's the part you're least sure about?",                          c:"Self-Reflection & Process" },
  { t:"What surprised you while working on this?",                         c:"Self-Reflection & Process" },
  { t:"What took longer than you expected?",                               c:"Self-Reflection & Process" },
  { t:"What came easier than you expected?",                               c:"Self-Reflection & Process" },
  { t:"How does this hold up on mobile?",                                  c:"Flow & Experience" },
  { t:"Where might someone click off, and why?",                           c:"Flow & Experience" },
  { t:"Does the flow feel intentional?",                                   c:"Flow & Experience" },
  { t:"What's the weakest link in the journey?",                           c:"Flow & Experience" },
  { t:"What's the first thing the eye lands on?",                          c:"Flow & Experience" },
  { t:"What's the last thing someone sees before deciding?",               c:"Flow & Experience" },
  { t:"Is there anywhere the pacing feels off?",                           c:"Flow & Experience" },
  { t:"Where does the listing lose momentum?",                             c:"Flow & Experience" },
  { t:"Where does it pick up?",                                            c:"Flow & Experience" },
  { t:"What's a choice you made that you'd defend hardest?",               c:"Decision-Making" },
  { t:"What's a choice you'd reconsider?",                                 c:"Decision-Making" },
  { t:"What did the brand push for that you weren't sure about?",          c:"Decision-Making" },
  { t:"What did you push for that the brand wasn't sure about?",           c:"Decision-Making" },
  { t:"What constraint shaped this the most?",                             c:"Decision-Making" },
  { t:"What would you do if you had no constraints?",                      c:"Decision-Making" },
  { t:"What did you almost include but didn't?",                           c:"Decision-Making" },
  { t:"What's something you included that you almost didn't?",             c:"Decision-Making" },
  { t:"What's this listing's job?",                                        c:"Big Picture" },
  { t:"What's the one thing it has to do well?",                           c:"Big Picture" },
  { t:"What does success look like for this?",                             c:"Big Picture" },
  { t:"How will you know if it's working?",                                c:"Big Picture" },
  { t:"What's the story this listing tells?",                              c:"Big Picture" },
  { t:"What's the feeling you want someone to walk away with?",            c:"Big Picture" },
  { t:"If this were a billboard, what's the message?",                     c:"Big Picture" },
  { t:"What does this say about the brand at a glance?",                   c:"Big Picture" },
  { t:"If you had to explain this in one sentence, what would you say?",   c:"Curveballs" },
  { t:"What would make you scroll past this in search?",                   c:"Curveballs" },
  { t:"If this product were a movie poster, what's the tagline?",          c:"Curveballs" },
  { t:"What's the most \"you\" thing about this design?",                  c:"Curveballs" },
  { t:"What's the least \"you\" thing about this design?",                 c:"Curveballs" },
  { t:"If a competitor saw this, what would worry them?",                  c:"Curveballs" },
  { t:"What's something here only you would notice?",                      c:"Curveballs" },
  { t:"What's the riskiest thing about this listing?",                     c:"Curveballs" },
  { t:"What's the safest thing, and is that a problem?",                   c:"Curveballs" },
  { t:"If you had to start over tomorrow, what would you keep?",           c:"Curveballs" },
];

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

let deck  = shuffle(ALL);
let idx   = 0;
let state = 'idle'; // 'idle' | 'cracked' | 'busy'

const scene       = document.getElementById('scene');
const fortuneText = document.getElementById('fortuneText');
const fortuneCat  = document.getElementById('fortuneCat');
const hintEl      = document.getElementById('hint');
const counterEl   = document.getElementById('counter');

function loadQuestion() {
  if (idx >= deck.length) { deck = shuffle(ALL); idx = 0; }
  const q = deck[idx];
  fortuneText.textContent = q.t;
  fortuneCat.textContent  = q.c;
  counterEl.textContent   = `${idx + 1} · ${deck.length}`;
}

function crack() {
  state = 'busy';
  loadQuestion();
  scene.classList.add('cracked');
  // Animations total ~0.85s; unlock after that
  setTimeout(() => {
    state = 'cracked';
    hintEl.textContent = 'tap to crack another';
  }, 900);
}

function reset(then) {
  state = 'busy';
  scene.classList.remove('cracked');
  scene.classList.add('resetting');
  setTimeout(() => {
    scene.classList.remove('resetting');
    void scene.offsetWidth; // force reflow so animations restart cleanly
    idx++;
    then();
  }, 340);
}

scene.addEventListener('click', () => {
  if (state === 'idle')    { crack(); }
  if (state === 'cracked') { reset(crack); }
});

document.addEventListener('keydown', e => {
  if ([' ', 'Enter', 'ArrowRight'].includes(e.key)) {
    e.preventDefault();
    if (state === 'idle')    { crack(); }
    if (state === 'cracked') { reset(crack); }
  }
});
</script>
</body>
</html>
